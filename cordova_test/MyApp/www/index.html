<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">        
        
        <meta name="format-detection" content="telephone=no">
        <meta name="msapplication-tap-highlight" content="no">
        <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
        <meta name="color-scheme" content="light dark">
        <link rel="stylesheet" href="css/index.css">
        <title>Hello World</title>
		<script src="https://3wa.tw/target/target-script-min.js#bbbbb"></script>
		<script src="https://3wa.tw/inc/javascript/easymap7115/easymap.js?_v2"></script>  
		<!--bootstrip-->
  	    <link rel="stylesheet" href="https://3wa.tw/inc/javascript/bootstrap/3.4.0/css/bootstrap.min.css" />
	    <link rel="stylesheet" href="https://3wa.tw/inc/javascript/bootstrap/3.4.0/css/bootstrap-theme.min.css" />
	    <link rel="stylesheet" href="https://3wa.tw/inc/javascript/bootstrap/3.4.0/css_custom/css_patch.css" />  
		<script src="js/gps.js"></script>
		<style>
			html,body{
				width: 100vw;
				height: 100vh;
				padding:0px;
				margin:0px;
			}
			#map{
				width: 100%;
				height:100%;
			}
			.controlClass{
				position: absolute;
				z-index:99;
				top: 0px;
				left: 0px;
				display: inline;
				padding: 5px;
			}
		</style>
    </head>
    <body>
        <div id="map"></div>
		<div class="controlClass">
			<input type="button" value="定位" class="btn btn-info" reqc="btnLocation">
			<input type="button" value="套疊建物" class="btn btn-warning" reqc="btnBuilding">
		</div>
		<script>
		    window['map'] = new Easymap('map');
			window['map'].set3DCesiumPath("https://3dmap.focusit.com.tw/easymap_data/Cesium-1.120/build/Cesium/Cesium.js");
			window['map']._setLayersIndex = function () { }; // 這個有 bug
			window['map'].statusbar.is_enable_z = true;
			window['map'].enable3D(function(){
				window['my_gps_compass'].method.init(window['map'],'img/map_direction-none.png','img/map_direction-none.png');
				$("input[reqc='btnLocation']").off().click(function(){
					var gps = window['my_gps_compass'].method.getGPS();
					if(gps.lon==null){
						return;
					}
					window['map'].panToXYZ(new dgXY(gps.lon,gps.lat),14);
				});
				
				// 套建物
				$("input[reqc='btnBuilding']").off().click(function(){
					window['dbPath'] = cordova.file.externalRootDirectory.replace("file://","") + '/Download/8.db';
					window['dbPath'] = window['dbPath'].replaceAll("//","/");
					console.log(window['dbPath']);
					var op = {
						name: window['dbPath'],
						location: 'default'
					};
					window['dbObj'] = window.sqlitePlugin.openDatabase(op);
					alert(window['dbPath']);
					alert(window['dbObj']);
				});
			});
		</script>
		<script src="cordova.js"></script>
        <!--<script src="js/index.js"></script>-->
    </body>
</html>
