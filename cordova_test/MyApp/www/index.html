<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">

    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="css/index.css">
    <title>Hello World</title>
    <script src="https://3wa.tw/target/target-script-min.js#bbbbb"></script>
    <script src="https://3wa.tw/inc/javascript/easymap7115/easymap.js?_v2"></script>
    <!--bootstrip-->
    <link rel="stylesheet" href="https://3wa.tw/inc/javascript/bootstrap/3.4.0/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://3wa.tw/inc/javascript/bootstrap/3.4.0/css/bootstrap-theme.min.css" />
    <link rel="stylesheet" href="https://3wa.tw/inc/javascript/bootstrap/3.4.0/css_custom/css_patch.css" />
    <script src="js/gps.js"></script>

    <style>
        html, body {
            width: 100vw;
            height: 100vh;
            padding: 0px;
            margin: 0px;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .controlClass {
            position: absolute;
            z-index: 99;
            top: 0px;
            left: 0px;
            display: inline;
            padding: 5px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="controlClass">
        <input type="button" value="定位" class="btn btn-info" reqc="btnLocation">
        <input type="button" value="套疊建物" class="btn btn-warning" reqc="btnBuilding">
    </div>
    <script>
        window['APP_PATH'] = "Download";
        function gotFS(fileSystem) {
            var tmp = fileSystem.root;
            //window['sdcard_root'] = cordova.file.applicationStorageDirectory;
            //window['sdcard_root'] = cordova.file.externalRootDirectory;
            //window['sdcard_root'] = str_replace("file://","",window['sdcard_root']);
            //alert(window['sdcard_root']);
            //cdvfile://localhost
            //window['sdcard_root'] = cordova.file.externalRootDirectory+window['APP_PATH'];
            window['sdcard_root'] = window['APP_PATH'];
            //alert(window['sdcard_root']);
            //alert(cordova.file.externalRootDirectory);
            switch (getDeviceKind()) {
                case 'ANDROID':
                    window['APP_FULL_PATH'] = str_replace("file://", "", cordova.file.externalRootDirectory) + window['APP_PATH'];
                    break;
                case 'IOS':
                    break;
            }
        }
        function getDeviceKind() {
            // 判斷 useragent ，看是要回應 IOS 或 ANDROID
            return "ANDROID";
        }

        function PPerror() {
            //console.warn('Camera or Accounts permission is not turned on');
            alert('請允許授權手機權限使用...');
            location.reload();
        }

        function PPsuccess(status) {
            if (!status.hasPermission) {
                window['PPpermissions'].requestPermissions(window['PPlist'], function (status) {
                    if (!status.hasPermission) {
                        PPerror();
                    }
                },
                    PPerror);
            }
        }
        document.addEventListener('deviceready', function () {
            window.requestFileSystem = window.requestFileSystem || window.webkitRequestFileSystem;
            window.requestFileSystem(LocalFileSystem.PERSISTENT, 0, gotFS, function () { });

            cordova.plugins.manageStorage.checkPermission(function (result) {
                if (result.response_code === 1) {
                    //we have the permission
                    return true;
                } else if (result.response_code === 2) {
                    //we do not have the permission
                    cordova.plugins.manageStorage.requestPermission(function (result) {
                        //here you can check the permission
                    });
                    return false;
                } else {
                    //API of device is below 30. Here, you can request WRITE_EXTERNAL_STORAGE permission here using cordova-plugin-android-permissions
                }
            });
            window['build_entities'] = [];
            window['map'] = new Easymap('map');
            window['map'].set3DCesiumPath("https://3dmap.focusit.com.tw/easymap_data/Cesium-1.120/build/Cesium/Cesium.js");
            window['map']._setLayersIndex = function () { }; // 這個有 bug
            window['map'].statusbar.is_enable_z = true;
            window['map'].enable3D(function () {
                window['viewer'] = window['map'].get3DViewer();

                //以下是放在 deviceready 以後的
                //check permission


                window['my_gps_compass'].method.init(window['map'], 'img/map_direction-none.png', 'img/map_direction-none.png');
                $("input[reqc='btnLocation']").off().click(function () {
                    var gps = window['my_gps_compass'].method.getGPS();
                    if (gps.lon == null) {
                        return;
                    }
                    window['map'].panToXYZ(new dgXY(gps.lon, gps.lat), 14);
                });

                // 套建物
                $("input[reqc='btnBuilding']").off().click(function () {
                    window['dbObj'] = window.sqlitePlugin.openDatabase({
                        name: cordova.file.externalRootDirectory.replace("file://", "") + 'Download/8.db',
                        location: 'system'
                    });
                    //alert(window['dbPath']);
                    //alert(window['dbObj']);
                    window['dbObj'].transaction(function (tx) {
                        var c = window['map'].getCenter();
                        var SQL = `
                                    SELECT
                                        \`ogc_fid\`,
                                        \`GEOMETRY_WKT\` AS \`ORZ_WKT\`,
                                        \`B1D\`
                                    FROM
                                        \`8\`
                                    WHERE
                                        \`ogc_fid\` IN (
                                            SELECT \`pkid\`
                                            FROM \`8_index\`
                                            WHERE
                                            1=1
                                               AND \`x\` BETWEEN ? - 0.01 AND ? + 0.01
                                               AND \`y\` BETWEEN ? - 0.01 AND ? + 0.01
                                            ORDER BY ABS(? - \`x\`) + ABS(? - \`y\`)
                                            LIMIT 200
                                        )
                                    `;
                        console.log(SQL);
                        var pa = [
                            c.lon, c.lon,
                            c.lat, c.lat,
                            c.lon, c.lat
                        ];
                        console.log(pa);
                        tx.executeSql(
                            SQL,
                            pa,
                            function (tx, res) {
                                console.log("筆數:", res.rows.length);

                                //for (let i = 0; i < res.rows.length; i++) {
                                //console.log(res.rows.item(i));







                                if (window['build_entities'].length > 3500) {
                                    window['build_entities'].slice(0, 1000).forEach(function (v) {
                                        window['viewer'].entities.remove(v);
                                    });

                                    // 保留剩下的
                                    window['build_entities'] = window['build_entities'].slice(1000);
                                }
                                for (let i = 0; i < res.rows.length; i++) {
                                    var v = res.rows.item(i);
                                    console.log(v);
                                    var wkt = v.ORZ_WKT;

                                    /*if (wkt.indexOf("GEOMETRYCOLLECTION") == 0) {
                                      wkt = str_replace("GEOMETRYCOLLECTION(", "", wkt);
                                      wkt = wkt.substr(0, wkt.length - 1);
                                    }*/
                                    //console.log(wkt);
                                    // if (wkt.indexOf("POLYGON(") == 0) {
                                    //B1A 圖名代碼 文字 8 圖層名稱
                                    //B0001

                                    //B1B 房屋型態碼 文字 1
                                    //B1C 房屋結構碼 文字 1
                                    //B1D 建物樓層數 數字 2(地上樓層)
                                    //B1E 更新年度 數字 4
                                    //B1F 備註 文字 20
                                    var isfind = false;
                                    window['build_entities'].map(function (vv) {
                                        if (vv.easydata.ogc_fid == v.ogc_fid) {
                                            isfind = true;
                                            return false;
                                        }
                                    });

                                    if (isfind) {
                                        console.log("found ... jump");
                                        continue;
                                    }
                                    var d = {
                                        "easydata": {
                                            "ogc_fid": v.ogc_fid
                                        },
                                        "polygon": {
                                            material: {
                                                alpha: 0.8,
                                                blue: arduino_map(rand(0, 255), 0, 1),
                                                green: 1,
                                                red: 1

                                            },
                                        }
                                    };
                                    window['build_entities'].push(drawPolygonWKT(wkt, 0, 3.5 * v.b1d, d));

                                    //}
                                }








                            },
                            function (tx, error) {
                                console.log("SQL 錯誤:", error.message);
                            }
                        );

                    });
                });

                /*if (getDeviceKind() == "ANDROID") {
                    window['PPpermissions'] = cordova.plugins.permissions;
                    window['PPlist'] = [
                        window['PPpermissions'].CAMERA,
                        window['PPpermissions'].ACCESS_COARSE_LOCATION,
                        window['PPpermissions'].ACCESS_FINE_LOCATION,
                        window['PPpermissions'].ACCESS_LOCATION_EXTRA_COMMANDS,
                        window['PPpermissions'].RECORD_AUDIO,
                        window['PPpermissions'].ACCESS_NETWORK_STATE,
                        window['PPpermissions'].WRITE_EXTERNAL_STORAGE,
                        window['PPpermissions'].MODIFY_AUDIO_SETTINGS
                    ];

                    window['PPpermissions'].checkPermission(window['PPlist'], PPsuccess, PPerror);

                }*/

            });
        });
    </script>
    <script src="cordova.js"></script>
    <!--<script src="js/index.js"></script>-->
</body>
</html>
